# copilot-price league backend. Deploy once for your group; share the join code.
# The LEAGUE_SECRET is NOT stored here — set it with:
#   wrangler secret put LEAGUE_SECRET
name = "copilot-price-league"
main = "src/worker.ts"
compatibility_date = "2024-11-01"

[[d1_databases]]
binding = "DB"
database_name = "copilot-price-league"
# Fill in after `wrangler d1 create copilot-price-league`:
database_id = "REPLACE_WITH_YOUR_D1_DATABASE_ID"
